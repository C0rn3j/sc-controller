name: SCC Linux CI

on:
  push:
    branches:
      - main
      - master
      - python3
  pull_request:
    branches:
      - main
      - master
      - python3
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: pip install build evdev setuptools ioctl-opt libusb1 vdf pytest

      - name: Build SCC
        run: python -m build

      - name: Run tests
        run: python -m pytest tests
